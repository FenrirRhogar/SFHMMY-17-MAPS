<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Spit rod -->
  <line x1="2"  y1="30" x2="62" y2="30" stroke="#a87830" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pig body -->
  <ellipse cx="30" cy="27" rx="18" ry="13" fill="#c8961a" stroke="#d4a843" stroke-width="1.5"/>
  <!-- Pig head -->
  <circle cx="48" cy="24" r="11" fill="#c8961a" stroke="#d4a843" stroke-width="1.5"/>
  <!-- Snout -->
  <ellipse cx="55" cy="27" rx="5" ry="4" fill="#a87830" stroke="#d4a843" stroke-width="1"/>
  <circle cx="53" cy="26" r="1.5" fill="#1a1508"/>
  <circle cx="57" cy="26" r="1.5" fill="#1a1508"/>
  <!-- Eye -->
  <circle cx="48" cy="20" r="2.2" fill="#1a1508"/>
  <circle cx="49" cy="19" r="0.9" fill="white"/>
  <!-- Ear -->
  <path d="M43,15 Q38,8 45,11 Q42,13 43,15 Z" fill="#d4a843"/>
  <!-- Tail -->
  <path d="M12,27 Q6,22 8,16 Q10,10 6,8" stroke="#c8961a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Stand posts -->
  <line x1="12" y1="30" x2="10" y2="52" stroke="#a87830" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="48" y1="30" x2="50" y2="52" stroke="#a87830" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Fire / flames -->
  <path d="M18,52 Q20,43 25,47 Q27,40 30,45 Q33,40 35,47 Q40,43 42,52 Q38,62 30,64 Q22,62 18,52 Z" fill="#d4a843"/>
  <path d="M24,54 Q26,47 29,50 Q31,45 33,50 Q36,47 38,54 Q35,63 30,64 Q25,63 24,54 Z" fill="#f0e0a0"/>
</svg>
