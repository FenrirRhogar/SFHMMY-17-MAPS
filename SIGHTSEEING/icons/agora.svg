<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Octagonal building outline -->
  <polygon points="20,6 44,6 58,20 58,44 44,58 20,58 6,44 6,20" fill="#1a1508" stroke="#d4a843" stroke-width="2"/>
  <!-- Roof / dome suggestion -->
  <polygon points="24,6 40,6 52,18 52,20 40,8 24,8 12,20 12,18" fill="#d4a843"/>
  <!-- Arcade arches row 1 -->
  <path d="M14,28 Q14,22 20,22 Q26,22 26,28" stroke="#d4a843" stroke-width="1.8" fill="none"/>
  <path d="M27,28 Q27,22 33,22 Q39,22 39,28" stroke="#d4a843" stroke-width="1.8" fill="none"/>
  <path d="M40,28 Q40,22 46,22 Q52,22 52,28" stroke="#d4a843" stroke-width="1.8" fill="none"/>
  <!-- Column verticals -->
  <line x1="14" y1="28" x2="14" y2="44" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="28" x2="26" y2="44" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="28" x2="39" y2="44" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="28" x2="52" y2="44" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base band -->
  <rect x="12" y="44" width="42" height="5" rx="1" fill="#a87830"/>
  <!-- Central clock / rose window -->
  <circle cx="33" cy="14" r="5" fill="#1a1508" stroke="#d4a843" stroke-width="1.5"/>
  <line x1="33" y1="10" x2="33" y2="18" stroke="#f0e0a0" stroke-width="1.2"/>
  <line x1="29" y1="14" x2="37" y2="14" stroke="#f0e0a0" stroke-width="1.2"/>
  <!-- Market stalls suggestion inside -->
  <rect x="16" y="32" width="8"  height="10" rx="1" fill="rgba(212,168,67,0.18)" stroke="#d4a843" stroke-width="0.8"/>
  <rect x="29" y="32" width="8"  height="10" rx="1" fill="rgba(212,168,67,0.18)" stroke="#d4a843" stroke-width="0.8"/>
  <rect x="42" y="32" width="8"  height="10" rx="1" fill="rgba(212,168,67,0.18)" stroke="#d4a843" stroke-width="0.8"/>
  <!-- Steps -->
  <rect x="20" y="49" width="26" height="3" rx="1" fill="#c8961a" opacity="0.6"/>
  <rect x="24" y="52" width="18" height="3" rx="1" fill="#c8961a" opacity="0.4"/>
</svg>
