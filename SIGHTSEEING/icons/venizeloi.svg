<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sun circle -->
  <circle cx="32" cy="20" r="11" fill="#d4a843" opacity="0.9"/>
  <!-- Sun rays -->
  <line x1="32" y1="5"  x2="32" y2="1"  stroke="#d4a843" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="9"  x2="49" y2="6"  stroke="#d4a843" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="51" y1="20" x2="55" y2="20" stroke="#d4a843" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="31" x2="49" y2="34" stroke="#d4a843" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="18" y1="9"  x2="15" y2="6"  stroke="#d4a843" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="13" y1="20" x2="9"  y2="20" stroke="#d4a843" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Horizon line -->
  <line x1="4" y1="34" x2="60" y2="34" stroke="#c8961a" stroke-width="1.5" opacity="0.6"/>
  <!-- Left tombstone (arched top) -->
  <rect x="10" y="40" width="18" height="20" rx="9 9 2 2" fill="#c8961a" stroke="#d4a843" stroke-width="1.5"/>
  <!-- Right tombstone -->
  <rect x="36" y="42" width="18" height="18" rx="9 9 2 2" fill="#c8961a" stroke="#d4a843" stroke-width="1.5"/>
  <!-- Crosses -->
  <line x1="19" y1="44" x2="19" y2="54" stroke="#f0e0a0" stroke-width="2"/>
  <line x1="14" y1="48" x2="24" y2="48" stroke="#f0e0a0" stroke-width="2"/>
  <line x1="45" y1="46" x2="45" y2="55" stroke="#f0e0a0" stroke-width="2"/>
  <line x1="40" y1="50" x2="50" y2="50" stroke="#f0e0a0" stroke-width="2"/>
  <!-- Ground -->
  <rect x="4" y="59" width="56" height="5" rx="2" fill="#a87830"/>
</svg>
