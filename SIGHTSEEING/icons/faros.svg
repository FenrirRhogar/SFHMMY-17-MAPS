  <rect x="27.5" y="46" width="9"  height="4" fill="#f0e0a0" opacity="0.25"/>
  <!-- Base -->
  <rect x="20" y="56" width="24" height="7" rx="2" fill="#a87830"/>
  <!-- Water ripple -->
  <path d="M4,62 Q16,58 28,62 Q40,66 52,62" stroke="#d4a843" stroke-width="1.3" fill="none" opacity="0.45" stroke-linecap="round"/>
