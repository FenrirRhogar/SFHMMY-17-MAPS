<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Light beams -->
  <line x1="32" y1="14" x2="8"  y2="4"  stroke="#ffe066" stroke-width="1.8" opacity="0.6" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="56" y2="4"  stroke="#ffe066" stroke-width="1.8" opacity="0.6" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="4"  y2="22" stroke="#ffe066" stroke-width="1.8" opacity="0.6" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="60" y2="22" stroke="#ffe066" stroke-width="1.8" opacity="0.6" stroke-linecap="round"/>
  <!-- Lantern room -->
  <rect x="23" y="8" width="18" height="10" rx="2" fill="#f0e0a0"/>
  <!-- Light glow -->
  <circle cx="32" cy="13" r="4.5" fill="#ffe066"/>
  <!-- Balcony -->
